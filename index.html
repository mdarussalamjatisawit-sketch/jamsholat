<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV Masjid DarUSSALAM - Adzan Iqomah Sholat</title>
    <style>
        /* CSS DASAR */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: white; height: 100vh; width: 100vw; overflow: hidden; }

        /* AREA UTAMA (Sama seperti sebelumnya) */
        #ui-normal { display: flex; flex-direction: column; height: 100vh; background: url('Foto masjid darussalam.png') no-repeat center center; background-size: cover; }
        
        /* SETUP MODAL FULL SCREEN */
        #mode-sholat { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #000; z-index: 99999; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
        }

        /* UKURAN HURUF */
        .txt-sedang { font-size: clamp(1.5rem, 5vw, 3.5rem); font-weight: 600; color: #fff; margin: 10px 0; }
        .txt-besar { 
            font-size: clamp(5rem, 25vw, 15rem); 
            font-weight: 900; 
            line-height: 0.8; 
            width: 100%;
            color: #ffd700;
            text-transform: uppercase;
        }

        /* EFEK BLINK (Nyala 2s, Mati 1s = Total 3s) */
        .blink-custom {
            animation: blink-anim 3s infinite;
        }
        @keyframes blink-anim {
            0%, 66% { opacity: 1; } /* Nyala 2 detik (66% dari 3s) */
            67%, 100% { opacity: 0; } /* Mati 1 detik */
        }

        /* CSS Lainnya untuk UI Normal (Disederhanakan agar fokus ke fitur baru) */
        .top-container { padding: 10px; text-align: center; }
        .header-wrapper { display: inline-block; border: 2px solid #D4AF37; padding: 5px 20px; border-radius: 50px; background: rgba(0,0,0,0.8); }
        .marquee-container { margin: 10px auto; width: 90%; border: 1.5px solid #D4AF37; height: 35px; overflow: hidden; position: relative; border-radius: 20px; }
        .marquee-content { position: absolute; width: 100%; text-align: center; line-height: 32px; opacity: 0; transform: translateY(100%); transition: 0.5s; font-weight: bold; }
        .show-msg { opacity: 1; transform: translateY(0); }
        .middle-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 110px; }
        #jam-digital { font-size: 15vw; font-weight: 900; filter: drop-shadow(0 0 10px #ffd700); }
        .bottom-prayer { position: absolute; bottom: 0; width: 100%; display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; padding: 5px; background: #000; border-top: 3px solid #ffd700; }
        .p-box { border: 1px solid #ffd700; text-align: center; padding: 5px; border-radius: 5px; }
        .sholat-aktif { background: #ffd700; color: #000 !important; }
        .sholat-aktif * { color: #000 !important; }

        @media (max-width: 600px) { .bottom-prayer { grid-template-columns: repeat(3, 1fr); } .middle-container { padding-bottom: 130px; } }
    </style>
</head>
<body>

<div id="ui-normal">
    <div class="top-container">
        <div class="header-wrapper"><h2>MASJID DARUSSALAM</h2></div>
        <div class="marquee-container">
            <div id="run-1" class="marquee-content show-msg">Perum Jatisawit Asri, Jitengan, Balecatur, Gamping</div>
            <div id="run-2" class="marquee-content">Jadwal Sholat Mengacu KHGT</div>
        </div>
    </div>
    <div class="middle-container">
        <div id="jam-digital">00.00.00</div>
        <div id="tgl-masehi">--</div>
    </div>
    <div class="bottom-prayer">
        <div class="p-box" id="box-SUBUH"><div>SUBUH</div><b id="sh-subuh">--:--</b></div>
        <div class="p-box" id="box-SYURUQ"><div>SYURUQ</div><b id="sh-terbit">--:--</b></div>
        <div class="p-box" id="box-ZUHUR"><div>ZUHUR</div><b id="sh-zuhur">--:--</b></div>
        <div class="p-box" id="box-ASHAR"><div>ASHAR</div><b id="sh-ashar">--:--</b></div>
        <div class="p-box" id="box-MAGHRIB"><div>MAGHRIB</div><b id="sh-maghrib">--:--</b></div>
        <div class="p-box" id="box-ISYA"><div>ISYA</div><b id="sh-isya">--:--</b></div>
    </div>
</div>

<div id="mode-sholat">
    <div id="msg-atas" class="txt-sedang"></div>
    <div id="msg-utama" class="txt-besar"></div>
    <div id="msg-bawah" class="txt-sedang"></div>
</div>

<script>
    // ==========================================
    // STEL DURASI DI SINI (DETIK)
    // ==========================================
    const DURASI_ADZAN  = 10; // 3 Menit
    const DURASI_IQOMAH = 10; // 10 Menit
    const DURASI_SHOLAT = 10; // 10 Menit (Layar Ibadah)
    // ==========================================

    const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=224039655&single=true&output=csv';
    let jadwal = {}; let timerSholat; let modeAktif = false;

    // Running Text 2s tampil, 1s jeda
    let teksIdx = 1;
    setInterval(() => {
        document.getElementById('run-1').classList.remove('show-msg');
        document.getElementById('run-2').classList.remove('show-msg');
        teksIdx = teksIdx === 1 ? 2 : 1;
        setTimeout(() => {
            document.getElementById('run-' + teksIdx).classList.add('show-msg');
        }, 1000); // Jeda 1 detik
    }, 4000);

    async function muatData() {
        try {
            const res = await fetch(urlCSV + '&t=' + Date.now());
            const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
            const b2 = rows[2];
            jadwal = { "SUBUH": b2[1], "SYURUQ": b2[2], "ZUHUR": b2[3], "ASHAR": b2[4], "MAGHRIB": b2[5], "ISYA": b2[6] };
            document.getElementById('sh-subuh').innerText = jadwal.SUBUH;
            document.getElementById('sh-terbit').innerText = jadwal.SYURUQ;
            document.getElementById('sh-zuhur').innerText = jadwal.ZUHUR;
            document.getElementById('sh-ashar').innerText = jadwal.ASHAR;
            document.getElementById('sh-maghrib').innerText = jadwal.MAGHRIB;
            document.getElementById('sh-isya').innerText = jadwal.ISYA;
        } catch (e) { console.error("Gagal muat jadwal"); }
    }

    function sistemWaktu() {
        const now = new Date();
        const jamMenit = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        document.getElementById('jam-digital').innerText = now.getHours().toString().padStart(2,'0') + "." + now.getMinutes().toString().padStart(2,'0') + "." + now.getSeconds().toString().padStart(2,'0');
        document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        // Highlight jadwal yang sedang berjalan
        const urutan = ["SUBUH", "SYURUQ", "ZUHUR", "ASHAR", "MAGHRIB", "ISYA"];
        let aktif = "";
        for (let i = 0; i < urutan.length; i++) {
            if (jamMenit >= jadwal[urutan[i]]) aktif = urutan[i];
        }
        if (!aktif) aktif = "ISYA";

        urutan.forEach(s => {
            document.getElementById('box-' + s).className = (s === aktif) ? 'p-box sholat-aktif' : 'p-box';
        });

        // Trigger masuk waktu Adzan
        if (jadwal[aktif] === jamMenit && !modeAktif && aktif !== "SYURUQ" && now.getSeconds() < 2) {
            mulaiModeSholat("ADZAN", aktif, DURASI_ADZAN);
        }
    }

    function mulaiModeSholat(tipe, nama, detikSisa) {
        modeAktif = true;
        const modal = document.getElementById('mode-sholat');
        const mAtas = document.getElementById('msg-atas');
        const mUtama = document.getElementById('msg-utama');
        const mBawah = document.getElementById('msg-bawah');
        
        modal.style.display = 'flex';
        let sisa = detikSisa;

        clearInterval(timerSholat);
        timerSholat = setInterval(() => {
            if (tipe === "ADZAN") {
                mAtas.innerText = "SAAT ADZAN"; // Statis Sedang
                mAtas.className = "txt-sedang";
                mUtama.innerText = nama; // Besar Blink
                mUtama.className = "txt-besar blink-custom";
                mBawah.innerText = "TENANG DAN MENDENGARKAN"; // Statis Sedang
                mBawah.className = "txt-sedang";
            } 
            else if (tipe === "IQOMAH") {
                mAtas.innerText = "SAAT IQOMAH"; // Sedang Blink
                mAtas.className = "txt-sedang blink-custom";
                let m = Math.floor(sisa / 60);
                let s = sisa % 60;
                mUtama.innerText = m + ":" + (s < 10 ? '0' + s : s); // Besar Statis
                mUtama.className = "txt-besar";
                mBawah.innerText = "DIRIKAN SHOLAT SUNAH"; // Statis Sedang
                mBawah.className = "txt-sedang";
            } 
            else if (tipe === "SHOLAT") {
                mAtas.innerText = "DIRIKAN"; // Statis Sedang
                mAtas.className = "txt-sedang";
                mUtama.innerText = nama; // Besar Blink
                mUtama.className = "txt-besar blink-custom";
                mBawah.innerText = "NIAT & SHOLAT DENGAN KHUSYU"; // Statis Sedang
                mBawah.className = "txt-sedang";
            }

            sisa--;
            if (sisa < 0) {
                if (tipe === "ADZAN") mulaiModeSholat("IQOMAH", nama, DURASI_IQOMAH);
                else if (tipe === "IQOMAH") mulaiModeSholat("SHOLAT", nama, DURASI_SHOLAT);
                else {
                    modal.style.display = 'none';
                    modeAktif = false;
                    clearInterval(timerSholat);
                }
            }
        }, 1000);
    }

    setInterval(sistemWaktu, 1000);
    muatData(); setInterval(muatData, 600000);
</script>
</body>
</html>
