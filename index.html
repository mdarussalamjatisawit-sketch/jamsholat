<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Masjid Darussalam - Black Neon Golden Header</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { 
            background: #000 url('masjid.jpg') no-repeat center center fixed; 
            background-size: cover; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: -1; }
        
        /* HEADER: Hitam Pekat dengan Logo Emas Lebar & Pink Neon */
        .header-section { 
            background: #000; 
            text-align: center; 
            padding: 20px 0; /* Memberi ruang lebih di atas dan bawah logo */
            border-bottom: 4px solid #ff00ff; 
            box-shadow: 0 0 25px #ff00ff;
        }
        .logo-masjid { 
            width: 95%;           /* Lebar hampir memenuhi layar TV */
            max-width: 1800px;    /* Batas maksimal agar tidak pecah di TV besar */
            height: auto;         /* Tinggi otomatis mengikuti proporsi gambar asli */
            max-height: 180px;    /* Batas tinggi maksimal (saya tingkatkan dari 130px agar lebih besar) */
            object-fit: contain;  /* Memastikan gambar tidak gepeng */
            filter: drop-shadow(0 0 15px #ff00ff); /* Pendaran pink neon pada logo emas */
        }

        .marquee-box { background: rgba(0,0,0,0.8); color: #fff; padding: 5px 0; font-size: 1.4rem; white-space: nowrap; overflow: hidden; }
        .marquee { display: inline-block; padding-left: 100%; animation: jalan 30s linear infinite; }
        @keyframes jalan { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .clock-section { text-align: center; padding: 15px 0; }
        #jam-digital { font-size: 8rem; font-weight: bold; line-height: 1; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .dates { display: flex; justify-content: center; gap: 30px; margin-top: 5px; }
        #tgl-masehi { font-size: 2.2rem; color: #ffd700; text-shadow: 2px 2px 5px #000; }
        #tgl-hijriah { font-size: 2.2rem; color: #00ff00; font-weight: bold; text-shadow: 2px 2px 5px #000; }

        .info-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 10px 40px; flex: 1; align-items: start; }
        .card { background: rgba(0, 0, 0, 0.7); border: 2px solid #2e7d32; border-radius: 15px; overflow: hidden; }
        .card-h { background: #2e7d32; color: #ffd700; padding: 8px; font-weight: bold; text-align: center; font-size: 1.4rem; }
        .card-b { padding: 10px 20px; }
        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #444; font-size: 1.5rem; }

        /* JADWAL SHOLAT (6 Kotak) */
        .prayer-section { 
            display: grid; grid-template-columns: repeat(6, 1fr); 
            gap: 12px; padding: 20px; background: rgba(0, 40, 0, 0.7); border-top: 4px solid #ffd700; 
        }
        .p-box { background: rgba(0, 0, 0, 0.6); border: 2px solid #ffd700; border-radius: 12px; padding: 12px; text-align: center; transition: all 0.6s ease; }
        .p-name { color: #ffd700; font-size: 1.2rem; font-weight: bold; }
        .p-time { font-size: 2.8rem; font-weight: bold; }

        /* WARNA EMAS UNTUK WAKTU SELANJUTNYA */
        .next-sholat { 
            background: linear-gradient(145deg, #ffd700, #b8860b) !important; 
            transform: scale(1.1); /* Sedikit membesar */
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.9); /* Glow emas kuat */
            border: 3px solid #fff;
            z-index: 10;
        }
        .next-sholat .p-name, .next-sholat .p-time { color: #000 !important; }

        /* MODE ADZAN/IQOMAH: BACKGROUND HITAM TOTAL */
        #mode-sholat {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; /* Latar Belakang Hitam Pekat Tanpa Gambar */
            z-index: 9999; text-align: center; padding-top: 100px;
        }
        
        /* EFEK TEKS NEON PINK PADA LAYAR HITAM TOTAL */
        .big-text { 
            color: #fff; font-size: 18vw; /* Ukuran huruf sangat besar (hampir selebar layar) */
            font-weight: 900; display: block; line-height: 1; 
            text-shadow: 0 0 10px #fff, 0 0 20px #ff00ff, 0 0 40px #ff00ff, 0 0 80px #ff00ff, 0 0 120px #ff00ff; /* Glow pink neon berlapis */
            text-transform: uppercase;
        }
        .judul-atas { font-size: 5rem; color: #ffd700; font-weight: bold; text-shadow: 2px 2px 10px rgba(255, 215, 0, 0.5); }
        .sub-teks { font-size: 3.5rem; color: #00ff00; margin-top: 30px; text-shadow: 2px 2px 10px rgba(0, 255, 0, 0.5); }

        .blink-custom { animation: blinker 2s linear infinite; }
        @keyframes blinker { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div id="ui-normal">
        <div class="header-section">
            <img src="Masjid daeussalam emas.png" alt="Logo Mewah" class="logo-masjid">
        </div>
        <div class="marquee-box"><div class="marquee">Perum Jatisawit Asri, Jitengan, Balecatur, Gamping, Sleman &bull; Mengacu KHGT Muhammadiyah</div></div>
        
        <div class="clock-section">
            <div id="jam-digital">00:00:00</div>
            <div class="dates"><div id="tgl-masehi">--</div><div id="tgl-hijriah">--</div></div>
        </div>

        <div class="info-section">
            <div class="card">
                <div class="card-h">KEUANGAN</div>
                <div class="card-b">
                    <div class="row"><span>Masuk</span><span id="kas-in">0</span></div>
                    <div class="row"><span>Keluar</span><span id="kas-out">0</span></div>
                    <div class="row" style="color:#ffd700; font-weight:bold;"><span>SALDO</span><span id="kas-saldo">0</span></div>
                </div>
            </div>
            <div class="card">
                <div class="card-h">PETUGAS</div>
                <div class="card-b">
                    <div class="row"><span>Tarawih</span><span id="im-t">-</span></div>
                    <div class="row"><span>Subuh</span><span id="im-s">-</span></div>
                    <div class="row"><span>Jum'at</span><span id="im-j">-</span></div>
                </div>
            </div>
        </div>

        <div class="prayer-section">
            <div class="p-box" id="box-SUBUH"><div class="p-name">SUBUH</div><div class="p-time" id="sh-subuh">--:--</div></div>
            <div class="p-box" id="box-SYURUQ"><div class="p-name">SYURUQ</div><div class="p-time" id="sh-terbit">--:--</div></div>
            <div class="p-box" id="box-ZUHUR"><div class="p-name">ZUHUR</div><div class="p-time" id="sh-zuhur">--:--</div></div>
            <div class="p-box" id="box-ASHAR"><div class="p-name">ASHAR</div><div class="p-time" id="sh-ashar">--:--</div></div>
            <div class="p-box" id="box-MAGHRIB"><div class="p-name">MAGHRIB</div><div class="p-time" id="sh-maghrib">--:--</div></div>
            <div class="p-box" id="box-ISYA"><div class="p-name">ISYA</div><div class="p-time" id="sh-isya">--:--</div></div>
        </div>
    </div>

    <div id="mode-sholat">
        <div id="msg-atas" class="judul-atas">SAAT ADZAN</div>
        <div id="msg-utama" class="big-text">--</div>
        <div id="msg-bawah" class="sub-teks">--</div>
    </div>

    <script>
        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=224039655&single=true&output=csv';
        let jadwal = {};
        let iqomahTimer = 600; 
        let modeAktif = false;

        async function muatData() {
            try {
                const res = await fetch(urlCSV + '&t=' + Date.now());
                const text = await res.text();
                const rows = text.split(/\r?\n/).map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
                const b1 = rows[1]; const b2 = rows[2];
                document.getElementById('tgl-hijriah').innerText = b1[2] + " " + b2[0];
                
                jadwal = { "SUBUH": b2[1], "SYURUQ": b2[2], "ZUHUR": b2[3], "ASHAR": b2[4], "MAGHRIB": b2[5], "ISYA": b2[6] };
                
                document.getElementById('sh-subuh').innerText = b2[1];
                document.getElementById('sh-terbit').innerText = b2[2];
                document.getElementById('sh-zuhur').innerText = b2[3];
                document.getElementById('sh-ashar').innerText = b2[4];
                document.getElementById('sh-maghrib').innerText = b2[5];
                document.getElementById('sh-isya').innerText = b2[6];

                document.getElementById('kas-in').innerText = b2[8] || "0";
                document.getElementById('kas-out').innerText = b2[9] || "0";
                document.getElementById('kas-saldo').innerText = b2[10] || "0";
                document.getElementById('im-t').innerText = b2[11] || "-";
                document.getElementById('im-s').innerText = b2[12] || "-";
                document.getElementById('im-j').innerText = b2[13] || "-";
            } catch (e) { console.log("Data error"); }
        }

        function jamAktif() {
            const now = new Date();
            const jamSkrgStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false }).replace('.', ':');
            document.getElementById('jam-digital').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

            // LOGIKA WARNA EMAS (Next Sholat)
            let foundNext = false;
            let listSholat = ["SUBUH", "SYURUQ", "ZUHUR", "ASHAR", "MAGHRIB", "ISYA"];
            
            listSholat.forEach(s => {
                let box = document.getElementById('box-' + s);
                box.classList.remove('next-sholat');
                if (!foundNext && jamSkrgStr < jadwal[s]) {
                    box.classList.add('next-sholat');
                    foundNext = true;
                }
            });
            if (!foundNext) document.getElementById('box-SUBUH').classList.add('next-sholat');

            // LOGIKA ADZAN & IQOMAH
            let adzanTiba = false;
            let namaSholat = "";
            for (let s in jadwal) {
                if (s !== "SYURUQ" && jamSkrgStr === jadwal[s]) { adzanTiba = true; namaSholat = s; break; }
            }

            const alertDiv = document.getElementById('mode-sholat');
            const msgAtas = document.getElementById('msg-atas');
            const msgUtama = document.getElementById('msg-utama');
            const msgBawah = document.getElementById('msg-bawah');

            if (adzanTiba && !modeAktif) {
                modeAktif = true;
                alertDiv.style.display = 'block';
                msgAtas.innerText = "SAAT ADZAN";
                msgAtas.classList.remove('blink-custom');
                msgUtama.innerText = namaSholat;
                msgUtama.classList.add('blink-custom'); // Teks Sholat berkedip
                msgBawah.innerText = "Matikan HP & Sholat Sunah";
                iqomahTimer = 600; 
            } 
            else if (modeAktif && iqomahTimer > 0) {
                iqomahTimer--;
                let m = Math.floor(iqomahTimer / 60);
                let d = iqomahTimer % 60;
                msgAtas.innerText = "MENUJU IQOMAH";
                msgAtas.classList.add('blink-custom'); // Menuju Iqomah berkedip
                msgUtama.classList.remove('blink-custom'); // Jam tidak berkedip
                msgUtama.innerText = `${m}:${d < 10 ? '0'+d : d}`;
                msgBawah.innerText = "MATIKAN HP";
            }
            else if (modeAktif && iqomahTimer <= 0) {
                msgAtas.innerText = "DIRIKAN";
                msgAtas.classList.remove('blink-custom');
                msgUtama.innerText = "SHOLAT";
                msgBawah.innerText ="NIAT SHOLAT DENGAN KHUSYU'";
                setTimeout(() => { modeAktif = false; alertDiv.style.display = 'none'; }, 60000);
            }
        }

        setInterval(jamAktif, 1000);
        setInterval(muatData, 60000);
        window.onload = muatData;
    </script>
</body>
</html>
