<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Masjid DarUSSALAM - Full Screen Adzan</title>
    <style>
        /* CSS DASAR */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
             body { 
            /* Menggunakan nama file yang sesuai */
            background: #000 url('Foto masjid darussalam.png') no-repeat center center fixed; 
            
            /* KUNCI: Ubah dari cover menjadi 100% 100% agar gambar dipaksa full */
            background-size: 100% 100%; 

            color: white; 
            height: 100vh; 
            width: 100vw; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            margin: 0;
       }



        /* HEADER KAPSUL */
        .header-section { text-align: center; padding: 10px 0; }
        
        .header-wrapper {
            display: inline-block;
            background: #000000;
            padding: 5px 5%; /* Menggunakan % agar fleksibel */
            border-radius: 50px;
            border: 3px solid #D4AF37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            animation: muncul-halus 2s ease-out forwards;
        }

        .header-text { 
            font-family: 'Arial Black', Gadget, sans-serif; 
            font-size: 3.5rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            background: linear-gradient(to bottom, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(3px 3px 2px rgba(0,0,0,1));
            animation: animasi-pijar-gold 3s ease-in-out infinite;
        }

        /* RUNNING TEXT */
        /* --- EDIT RUNNING TEXT DI SINI --- */
.marquee-container { 
    margin: 10px auto; 
    
    /* 1. MERUBAH LEBAR BOX */
    /* Ubah persentasenya: 100% (full layar), 80% (lebih pendek) */
    width: 50%; 
    
    background: rgba(0, 0, 0, 0.7); 
    overflow: hidden; 
    white-space: nowrap; 
    padding: 8px 0; 
    border-radius: 50px; 
    
    /* 2. MERUBAH WARNA OUTLINE */
    /* Ganti #D4AF37 dengan warna pilihan (sekarang saya set EMAS) */
    border: 3px solid #D4AF37; 
    
    /* 3. MERUBAH WARNA PIJAR (GLOW) */
    /* Sesuaikan warnanya agar senada dengan outline */
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); 
}
        .marquee-text { 
            display: inline-block; 
            font-size: 1.2rem; 
            color: #fff; 
            animation: jalan-mulus 40s linear infinite;
            will-change: transform;
        }

        /* AREA TENGAH */
        .main-display { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            padding: 10px;
        }

        #jam-digital {
            font-family: 'Arial Black', Gadget, sans-serif;
            font-size: 13rem; 
            font-weight: 900;
            line-height: 0.8;
            background: linear-gradient(to bottom, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(5px 5px 5px rgba(0,0,0,1));
            flex-shrink: 0;
        }

       /* 1. Atur container utamanya dulu */
        .dates { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 15px; 
            font-size: 1.5rem; 
            font-weight: 800; 
        }

        /* 2. Atur Tanggal Masehi dan geser ke KIRI */
        #tgl-masehi { 
            background: rgba(0, 0, 0, 0.7); 
            padding: 5px 20px; 
            border-radius: 50px; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            
           /* translateX(300px) untuk menggeser ke kiri dan kanan translateY(15px) untuk menggeser kotak ke atas dan bawah*/
            transform: translateX(-200px)translateY(15px);
        }

        /* 3. Atur Tanggal Hijriah dan geser ke KANAN */
        #tgl-hijriah { 
            background: rgba(0, 0, 0, 0.7); 
            padding: 5px 20px; 
            border-radius: 50px; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            color: #B1FB17 !important; 
            
            /* translateX(300px) untuk menggeser ke kiri dan kanan translateY(15px) untuk menggeser kotak ke atas dan bawah*/
            transform: translateX(250px)translateY(15px);
        }
.info-container { 
            display: flex; 
            gap: 30px; 
            width: 50%; /*ukuran box keuangan dan imam*/
            justify-content: center; 
        }

        .card { 
            background: rgba(0, 0, 0, 0.85); 
            border: 2px solid #D4AF37; /* Warna Emas */
            border-radius: 12px; 
            flex: 1; 
            max-width: 480px; 
            overflow: hidden;
        }

        .card-h { 
            background: #000; /* Header Hitam sesuai request sebelumnya */
            color: #D4AF37; 
            padding: 6px; 
            font-weight: bold; 
            text-align: center; 
            font-size: 1.1rem; 
            border-bottom: 2px solid #D4AF37;
        }

        .card-b { padding: 5px 15px; }

        .row { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px solid #444; 
            font-size: 1.05rem; 
            padding: 4px 0; 
        }

        /* =========================================
           KONTROL GESER BOX (MANUAL)
           ========================================= */

        /* BOX 1 (KEUANGAN - KIRI) */
        .card:nth-child(1) {
            /* translate(Kiri/Kanan , Atas/Bawah) */
            /* Minus (-) pertama = Kiri | Minus (-) kedua = Atas */
            transform: translate(-150px, 25px); 
        }

        /* BOX 2 (PENCERAMAH - KANAN) */
        .card:nth-child(2) {
            /* Positif (+) pertama = Kanan | Minus (-) kedua = Atas */
            transform: translate(250px, 25px); 
        }
        /* JADWAL SHOLAT */
        .prayer-section {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 5px;
            padding: 10px; 
           background: rgba(69, 70, 69, 0.308);
            border-top: 4px solid #ffd700;
        }
        .p-box { background: rgba(0,0,0,0.8); border: 2px solid #ffd700; border-radius: 10px; padding: 5px; text-align: center; }
        .p-name { color: #ffd700; font-size: 0.9rem; font-weight: bold; }
        .p-time { font-size: 2.2rem; font-weight: 900; line-height: 1; }
        .next-sholat { background: linear-gradient(145deg, #ffd700, #b8860b) !important; box-shadow: 0 0 15px #ffd700; }
        .next-sholat .p-name, .next-sholat .p-time { color: #000 !important; }

        /* --- RESPONSIVE ADJUSTMENTS (PENTING) --- */
        @media (max-width: 768px) {
            .header-text { font-size: 1.8rem; }
            #jam-digital { font-size: 5rem; }
            .dates { font-size: 1rem; }
            .p-time { font-size: 1.5rem; }
            .prayer-section { grid-template-columns: repeat(3, 1fr); }
            .main-display { justify-content: center; }
        }

        @keyframes animasi-pijar-gold {
            0%, 100% { filter: drop-shadow(3px 3px 2px #000) brightness(1); }
            50% { filter: drop-shadow(3px 3px 2px #000) brightness(1.2) drop-shadow(0 0 10px #ffd700); }
        }
        @keyframes jalan-mulus { from { transform: translate3d(100%, 0, 0); } to { transform: translate3d(-100%, 0, 0); } }
        @keyframes muncul-halus { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* MODAL ADZAN */
        #mode-sholat { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000 !important; z-index: 999999; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .big-text { color: #ffd700; font-size: 20vw; font-weight: 900; text-transform: uppercase; line-height: 0.8; }
        .sub-text { color: #fff; font-size: 4vw; margin: 20px 0; font-weight: bold; }
        .blink-custom { animation: blink-logic 2s linear infinite; }
        @keyframes blink-logic { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
    </style>
</head>
<body>

<div id="ui-normal" style="min-height: 100vh; display: flex; flex-direction: column;">
    <div class="header-section">
        <div class="header-wrapper">
            <div class="header-text">MASJID DARUSSALAM</div>
        </div>
        <div class="marquee-container">
            <div class="marquee-text">Perum Jatisawit Asri, Jitengan, Balecatur, Gamping, Sleman | Tanggal & jadwal SHOLAT Mengacu KHGT Muhammadiyah</div>
        </div>
    </div>

    <div class="main-display">
        <div id="jam-digital">00:00:00</div>
        <div class="dates">
            <div id="tgl-masehi">--</div>
            <div id="tgl-hijriah">--</div>
        </div>
        <div class="info-container">
            <div class="card">
                <div class="card-h">KEUANGAN MASJID</div>
                <div class="card-b">
                    <div class="row"><span>Masuk</span><span id="kas-in">0</span></div>
                    <div class="row"><span>Keluar</span><span id="kas-out">0</span></div>
                    <div class="row" style="color:#ffd700; font-weight:bold;"><span>SALDO</span><span id="kas-saldo">0</span></div>
                </div>
            </div>
            <div class="card">
                <div class="card-h">IMAM & PENCERAMAH</div>
                <div class="card-b">
                    <div class="row"><span>Tarawih</span><span id="im-t">-</span></div>
                    <div class="row"><span>Subuh</span><span id="im-s">-</span></div>
                    <div class="row"><span>Jum'at</span><span id="im-j">-</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="prayer-section">
        <div class="p-box" id="box-SUBUH"><div class="p-name">SUBUH</div><div class="p-time" id="sh-subuh">--:--</div></div>
        <div class="p-box" id="box-SYURUQ"><div class="p-name">SYURUQ</div><div class="p-time" id="sh-terbit">--:--</div></div>
        <div class="p-box" id="box-ZUHUR"><div class="p-name">ZUHUR</div><div class="p-time" id="sh-zuhur">--:--</div></div>
        <div class="p-box" id="box-ASHAR"><div class="p-name">ASHAR</div><div class="p-time" id="sh-ashar">--:--</div></div>
        <div class="p-box" id="box-MAGHRIB"><div class="p-name">MAGHRIB</div><div class="p-time" id="sh-maghrib">--:--</div></div>
        <div class="p-box" id="box-ISYA"><div class="p-name">ISYA</div><div class="p-time" id="sh-isya">--:--</div></div>
    </div>
</div>

<div id="mode-sholat">
    <div id="msg-atas" class="sub-text"></div>
    <div id="msg-utama" class="big-text"></div>
    <div id="msg-bawah" class="sub-text"></div>
</div>

<script>
    const DURASI_ADZAN = 10; 
    const DURASI_IQOMAH = 10; 
    const DURASI_SHOLAT = 10; 

    const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=224039655&single=true&output=csv';
    let jadwal = {}; let timer; let modeAktif = false;

    async function muatData() {
        try {
            const res = await fetch(urlCSV + '&t=' + Date.now());
            const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
            const b2 = rows[2];
            document.getElementById('tgl-hijriah').innerText = rows[1][2] + " " + b2[0];
            jadwal = { "SUBUH": b2[1].padStart(5, '0'), "SYURUQ": b2[2].padStart(5, '0'), "ZUHUR": b2[3].padStart(5, '0'), "ASHAR": b2[4].padStart(5, '0'), "MAGHRIB": b2[5].padStart(5, '0'), "ISYA": b2[6].padStart(5, '0') };
            document.getElementById('sh-subuh').innerText = jadwal.SUBUH;
            document.getElementById('sh-terbit').innerText = jadwal.SYURUQ;
            document.getElementById('sh-zuhur').innerText = jadwal.ZUHUR;
            document.getElementById('sh-ashar').innerText = jadwal.ASHAR;
            document.getElementById('sh-maghrib').innerText = jadwal.MAGHRIB;
            document.getElementById('sh-isya').innerText = jadwal.ISYA;
            document.getElementById('kas-in').innerText = b2[8];
            document.getElementById('kas-out').innerText = b2[9];
            document.getElementById('kas-saldo').innerText = b2[10];
            document.getElementById('im-t').innerText = b2[11];
            document.getElementById('im-s').innerText = b2[12];
            document.getElementById('im-j').innerText = b2[13];
        } catch (e) { console.error("CSV Error"); }
    }

    function sistemWaktu() {
        const now = new Date();
        const jamMenit = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        document.getElementById('jam-digital').innerText = now.toLocaleTimeString('id-ID');
        document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        let foundNext = false;
        const urutan = ["SUBUH", "SYURUQ", "ZUHUR", "ASHAR", "MAGHRIB", "ISYA"];
        urutan.forEach(s => {
            let box = document.getElementById('box-' + s);
            box.classList.remove('next-sholat');
            if (!foundNext && jamMenit < jadwal[s]) {
                box.classList.add('next-sholat');
                foundNext = true;
            }
        });
        if (!foundNext) document.getElementById('box-SUBUH').classList.add('next-sholat');

        for (let s in jadwal) {
            if (s !== "SYURUQ" && jamMenit === jadwal[s] && !modeAktif) {
                mulaiModeSholat("ADZAN", s, DURASI_ADZAN);
            }
        }
    }

    function mulaiModeSholat(tipe, nama, detik) {
        modeAktif = true;
        const ui = document.getElementById('mode-sholat');
        ui.style.display = 'flex';
        let sisa = detik;
        clearInterval(timer);
        timer = setInterval(() => {
            const m_atas = document.getElementById('msg-atas');
            const m_utama = document.getElementById('msg-utama');
            const m_bawah = document.getElementById('msg-bawah');
            m_atas.classList.remove('blink-custom');
            m_utama.classList.remove('blink-custom');

            if (tipe === "ADZAN") {
                m_atas.innerText = "SAAT ADZAN";
                m_utama.innerText = nama;
                m_utama.classList.add('blink-custom');
                m_bawah.innerText = "Harap Tenang & Mendengarkan";
            } else if (tipe === "IQOMAH") {
                m_atas.innerText = "MENUJU IQOMAH";
                m_atas.classList.add('blink-custom');
                let min = Math.floor(sisa / 60); let sec = sisa % 60;
                m_utama.innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
                m_bawah.innerText = "MATIKAN HP & DIRIKAN SHOLAT SUNNAH";
            } else if (tipe === "SHOLAT") {
                m_atas.innerText = "DIRIKAN";
                m_utama.innerText = "SHOLAT";
                m_utama.classList.add('blink-custom');
                m_bawah.innerText = "NIAT & SHOLAT DENGAN KHUSYU'";
            }

            sisa--;
            if (sisa < 0) {
                if (tipe === "ADZAN") mulaiModeSholat("IQOMAH", nama, DURASI_IQOMAH);
                else if (tipe === "IQOMAH") mulaiModeSholat("SHOLAT", nama, DURASI_SHOLAT);
                else { 
                    ui.style.display = 'none'; 
                    modeAktif = false; 
                    clearInterval(timer); 
                }
            }
        }, 1000);
    }

    setInterval(sistemWaktu, 1000);
    muatData(); setInterval(muatData, 600000);
</script>
</body>
</html>
