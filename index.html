<!DOCTYPE html>
<html>
<head>
    <title>Pembaca Data Lengkap</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; font-size: 1.1rem; line-height: 1.5; }
        .section { border: 2px solid #333; padding: 15px; margin-bottom: 20px; background: #111; border-radius: 8px; }
        .judul { color: yellow; font-size: 1.3rem; margin-bottom: 10px; border-bottom: 1px solid yellow; display: inline-block; }
        .kolom-item { margin-left: 20px; }
        .label { color: #888; }
        .isi { color: #fff; font-weight: bold; }
        #status { color: cyan; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>DEBUG DATA SPREADSHEET</h2>
    <div id="status">Menghubungkan ke Google Sheets...</div>
    <div id="debug-output"></div>

    <script>
        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=224039655&single=true&output=csv';

        async function bacaDataLengkap() {
            const output = document.getElementById('debug-output');
            const status = document.getElementById('status');
            
            try {
                const response = await fetch(urlCSV + '&cache=' + Date.now());
                const text = await response.text();
                const rows = text.split(/\r?\n/);
                
                let htmlKonten = "";
                
                // Ambil Header (Baris 0) untuk label
                let header = rows[0].split(',').map(v => v.replace(/"/g, '').trim());

                rows.forEach((row, index) => {
                    if (row.trim() === "") return; // Lewati baris kosong

                    let cols = row.split(',').map(v => v.replace(/"/g, '').trim());
                    
                    htmlKonten += `<div class="section">`;
                    htmlKonten += `<div class="judul">BARIS KE-${index} ${index === 0 ? '(HEADER)' : '(DATA)'}</div><br>`;
                    
                    cols.forEach((isi, colIdx) => {
                        let namaLabel = header[colIdx] || "Kolom Luar Jangkauan";
                        htmlKonten += `
                            <div class="kolom-item">
                                <span class="label">[${colIdx}] ${namaLabel}:</span> 
                                <span class="isi">${isi || '---'}</span>
                            </div>`;
                    });
                    
                    htmlKonten += `</div>`;
                });

                output.innerHTML = htmlKonten;
                status.innerText = "Berhasil membaca " + rows.length + " baris.";

            } catch (err) {
                status.innerHTML = "<span style='color:red'>Gagal: " + err.message + "</span>";
            }
        }

        bacaDataLengkap();
    </script>
</body>
</html>
