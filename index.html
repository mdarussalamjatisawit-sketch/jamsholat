<!DOCTYPE html>
<html>
<head>
    <title>Tes Data Baris 2</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .debug-box { background: #222; border: 1px solid yellow; padding: 15px; margin-top: 10px; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

    <h2>Script Tes 2: Menampilkan Isi Baris 2</h2>
    <div id="status">Menghubungkan...</div>

    <div class="debug-box" id="hasil">
        Sedang memuat isi kolom...
    </div>

    <script>
        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=224039655&single=true&output=csv';

        async function ambilData() {
            try {
                const response = await fetch(url + '&t=' + Date.now());
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/);
                
                if (rows.length > 1) {
                    // Ambil baris ke-2 (index 1)
                    let baris2 = rows[1];
                    
                    // Kita pecah untuk lihat ada berapa kolom
                    let cols = baris2.split(';');
                    if (cols.length < 5) cols = baris2.split(',');

                    let tampilan = "ISI ASLI BARIS 2:\n" + baris2 + "\n\n";
                    tampilan += "HASIL PECAHAN KOLOM:\n";
                    
                    cols.forEach((isi, index) => {
                        tampilan += "Kolom [" + index + "]: " + isi + "\n";
                    });

                    document.getElementById('hasil').innerText = tampilan;
                    document.getElementById('status').innerText = "Berhasil Membaca!";
                } else {
                    document.getElementById('status').innerText = "Sheet Terbaca, tapi isinya kosong?";
                }
            } catch (error) {
                document.getElementById('status').innerText = "Error: " + error.message;
            }
        }

        ambilData();
    </script>
</body>
</html>
