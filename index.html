<!DOCTYPE html>
<html>
<head>
    <title>Cek Kolom CSV Masjid</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; padding: 20px; }
        .baris { border: 2px solid #444; margin-bottom: 25px; padding: 15px; background: #111; border-radius: 10px; }
        .info-baris { color: #ffd700; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #444; margin-bottom: 10px; padding-bottom: 5px; }
        .item-kolom { display: flex; padding: 4px 0; border-bottom: 1px solid #222; }
        .nomor { color: #00ff00; width: 100px; flex-shrink: 0; }
        .isi { color: #ffffff; word-break: break-all; }
        #loading { color: cyan; font-size: 1.5rem; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:#ffd700;">DEBUG DATA PER KOLOM (PEMISAH KOMA)</h2>
    <div id="loading">Sedang Membaca CSV...</div>
    <div id="kontainer"></div>

    <script>
        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=224039655&single=true&output=csv';

        async function ambilData() {
            try {
                const response = await fetch(urlCSV + '&t=' + Date.now());
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/);
                
                const kontainer = document.getElementById('kontainer');
                const loading = document.getElementById('loading');
                loading.style.display = 'none';

                rows.forEach((row, index) => {
                    if (row.trim() === "") return; // Lewati jika baris kosong

                    // INI INTI PERBAIKANNYA: Memisahkan dengan Koma
                    const kolom = row.split(',').map(item => item.replace(/"/g, '').trim());

                    const divBaris = document.createElement('div');
                    divBaris.className = 'baris';

                    let htmlBaris = `<div class="info-baris">BARIS KE-${index}</div>`;
                    
                    kolom.forEach((isi, idx) => {
                        htmlBaris += `
                            <div class="item-kolom">
                                <span class="nomor">[Kolom ${idx}]</span>
                                <span class="isi">: ${isi || '<span style="color:red">KOSONG</span>'}</span>
                            </div>`;
                    });

                    divBaris.innerHTML = htmlBaris;
                    kontainer.appendChild(divBaris);
                });

            } catch (err) {
                document.getElementById('loading').innerHTML = "Gagal: " + err.message;
            }
        }

        ambilData();
    </script>
</body>
</html>
