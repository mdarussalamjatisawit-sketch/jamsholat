<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Masjid Darussalam - Final Fix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body {
            min-height: 100vh; width: 100vw;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1590076215667-875d45308666?q=80&w=2000') no-repeat center center fixed;
            background-size: cover; color: white; display: flex; flex-direction: column; padding: 15px; overflow: hidden;
        }
        .header { text-align: center; background: rgba(0, 80, 0, 0.9); padding: 15px; border-radius: 15px; border: 3px solid #ffd700; margin-bottom: 20px; }
        .header h1 { font-size: 2.5rem; color: #ffd700; text-shadow: 2px 2px 5px #000; }
        .main { flex: 1; display: flex; gap: 20px; }
        .side { flex: 0.8; display: flex; flex-direction: column; gap: 15px; }
        .card { background: rgba(0, 0, 0, 0.7); border-radius: 15px; border: 2px solid #2e7d32; overflow: hidden; }
        .card-h { background: #2e7d32; padding: 10px; text-align: center; font-weight: bold; color: #ffd700; font-size: 1.3rem; }
        .card-b { padding: 15px 25px; }
        .row { display: flex; border-bottom: 1px solid rgba(255,255,255,0.2); padding: 10px 0; justify-content: space-between; font-size: 1.2rem; }
        .center { flex: 1.3; background: rgba(0, 0, 0, 0.3); border-radius: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        #jam { font-size: 9rem; font-weight: bold; line-height: 1; }
        #tgl-m { font-size: 2rem; color: #ffd700; }
        #tgl-h { font-size: 2.2rem; color: #00ff00; font-weight: bold; }
        .footer { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 20px; }
        .box { background: rgba(0, 50, 0, 0.9); padding: 15px 5px; text-align: center; border: 2px solid #ffd700; border-radius: 15px; }
        .box-n { font-size: 1.1rem; color: #ffd700; font-weight: bold; }
        .box-t { font-size: 3rem; font-weight: bold; color: #fff; }
        #debug { position: fixed; bottom: 5px; right: 10px; font-size: 10px; color: #666; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MASJID DARUSSALAM</h1>
        <p>Jadwal KHGT Muhammadiyah (Data 2 Sheet Terpisah)</p>
    </div>

    <div class="main">
        <div class="side">
            <div class="card">
                <div class="card-h">KEUANGAN MASJID</div>
                <div class="card-b">
                    <div class="row"><span>Pemasukan</span><span id="k-in">0</span></div>
                    <div class="row"><span>Pengeluaran</span><span id="k-out">0</span></div>
                    <div class="row" style="color:#ffd700; border:none; font-weight:bold;"><span>SALDO</span><span id="k-s">0</span></div>
                </div>
            </div>
            <div class="card">
                <div class="card-h">PETUGAS HARI INI</div>
                <div class="card-b">
                    <div class="row"><span>ISYA/TARAWIH</span><span id="i-t">-</span></div>
                    <div class="row"><span>IMAM SUBUH</span><span id="i-s">-</span></div>
                    <div class="row"><span>IMAM JUM'AT</span><span id="i-j">-</span></div>
                </div>
            </div>
        </div>
        <div class="center">
            <div id="jam">00:00:00</div>
            <div id="tgl-m">Memuat...</div>
            <div id="tgl-h">--</div>
        </div>
    </div>

    <div class="footer">
        <div class="box"><div class="box-n">SUBUH</div><div class="box-t" id="s-fajr">--:--</div></div>
        <div class="box"><div class="box-n">SYURUQ</div><div class="box-t" id="s-sunr">--:--</div></div>
        <div class="box"><div class="box-n">ZUHUR</div><div class="box-t" id="s-dhuhr">--:--</div></div>
        <div class="box"><div class="box-n">ASHAR</div><div class="box-t" id="s-asr">--:--</div></div>
        <div class="box"><div class="box-n">MAGHRIB</div><div class="box-t" id="s-magh">--:--</div></div>
        <div class="box"><div class="box-n">ISYA</div><div class="box-t" id="s-isha">--:--</div></div>
    </div>

    <div id="debug">Status: Menunggu...</div>

    <script>
        // Link CSV dari 2 Sheet Berbeda
        const urlTampilan = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=73762516&single=true&output=csv';
        const urlJadwal = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=224039655&single=true&output=csv';

        async function updateData() {
            try {
                // 1. AMBIL DATA DARI SHEET "TAMPILAN JAM TV" (KAS & IMAM)
                const resT = await fetch(urlTampilan + '&cb=' + Date.now());
                const rowsT = (await resT.text()).split(/\r?\n/);
                if (rowsT.length > 1) {
                    // Cari baris yang ada isinya (bukan judul)
                    const d = rowsT[1].split(/[,;]/); 
                    document.getElementById('k-in').innerText = (d[1] || '0').replace(/"/g,'');
                    document.getElementById('k-out').innerText = (d[2] || '0').replace(/"/g,'');
                    document.getElementById('k-s').innerText = (d[3] || '0').replace(/"/g,'');
                    document.getElementById('i-t').innerText = (d[4] || '-').replace(/"/g,'');
                    document.getElementById('i-s').innerText = (d[5] || '-').replace(/"/g,'');
                    document.getElementById('i-j').innerText = (d[6] || '-').replace(/"/g,'');
                }

                // 2. AMBIL DATA DARI SHEET "JAM SHOLAT KHGT" (WAKTU SHOLAT)
                const resJ = await fetch(urlJadwal + '&cb=' + Date.now());
                const rowsJ = (await resJ.text()).split(/\r?\n/);
                
                const hariIni = new Date();
                const tglSaja = hariIni.getDate().toString(); // Angka "10"
                const namaHari = hariIni.toLocaleDateString('id-ID', { weekday: 'long' }); // "Selasa"

                let ditemukan = false;
                for (let i = 0; i < rowsJ.length; i++) {
                    const rowText = rowsJ[i].toLowerCase();
                    // JIKA baris mengandung kata "selasa" DAN angka "10"
                    if (rowText.includes(tglSaja) && rowText.includes(namaHari.toLowerCase())) {
                        const col = rowsJ[i].split(/[,;]/).map(c => c.replace(/"/g, '').trim());
                        
                        document.getElementById('tgl-h').innerText = col[1] || '--';
                        document.getElementById('s-fajr').innerText = col[2] || '--:--';
                        document.getElementById('s-sunr').innerText = col[3] || '--:--';
                        document.getElementById('s-dhuhr').innerText = col[4] || '--:--';
                        document.getElementById('s-asr').innerText = col[5] || '--:--';
                        document.getElementById('s-magh').innerText = col[6] || '--:--';
                        document.getElementById('s-isha').innerText = col[7] || '--:--';
                        
                        ditemukan = true;
                        document.getElementById('debug').innerText = "Data Jadwal OK";
                        break;
                    }
                }
                if(!ditemukan) document.getElementById('debug').innerText = "Jadwal tgl " + tglSaja + " tidak ketemu";

            } catch (e) { 
                document.getElementById('debug').innerText = "Error: " + e.message;
            }
        }

        function clock() {
            const n = new Date();
            document.getElementById('jam').innerText = n.toLocaleTimeString('id-ID');
            document.getElementById('tgl-m').innerText = n.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }

        window.onload = () => {
            updateData();
            setInterval(clock, 1000);
            setInterval(updateData, 300000); // Sinkron ulang tiap 5 menit
        };
    </script>
</body>
</html>
