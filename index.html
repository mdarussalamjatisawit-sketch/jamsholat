<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Masjid DarUSSALAM - Full Screen Adzan</title>
    <style>
        /* CSS DASAR */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: #000 url('Foto masjid darussalam.png') no-repeat center center fixed; 
            background-size: 100% 100%; 
            color: white; 
            height: 100vh; 
            width: 100vw; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* HEADER KAPSUL */
        .header-section { text-align: center; padding: 10px 0; }
        
        .header-wrapper {
            display: inline-block;
            background: #000000;
            padding: 5px 40px;
            border-radius: 50px;
            border: 3px solid #D4AF37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            animation: muncul-halus 2s ease-out forwards;
        }

      .header-text { 
            font-family: 'Arial Black', sans-serif; 
            font-size: clamp(1.5rem, 5vw, 3.5rem); 
            font-weight: 900; 
            text-transform: uppercase; 
            display: inline-flex; /* Supaya huruf berjejer */
            overflow: hidden;
        }

        /* Ini adalah gaya untuk tiap huruf */
    .header-text { 
            font-family: 'Arial Black', sans-serif; 
            font-size: clamp(1.5rem, 5vw, 3.5rem); 
            font-weight: 900; 
            text-transform: uppercase; 
            display: inline-flex; 
            overflow: hidden; /* Penting: agar huruf meluncur dari balik dinding kapsul */
        }

   /* Gaya untuk tiap huruf pada header tulisan masjid darussalam*/
    .header-text span {
            display: inline-block;
            
            /* 1. WARNA TENGAH (PERSIS JAM DIGITAL) */
           background: linear-gradient(to bottom, #fff 0%, #fff 0%, #fff 50%, #fff 0%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            /* 2. OUTLINE HIJAU STABILO RAPI (TEKNIK DROP-SHADOW JAM) */
            /* Menggunakan 4 sisi agar outline terlihat tebal dan rata */
            filter:                 
                drop-shadow(2px 0 0 #070707) /* LAYER 1: Pekat & Tajam (Paling Dekat Angka) */              
                drop-shadow(-2px 0 0 #070707)  /* Kita buat 4 arah agar warnanya solid mengunci bentuk angka */
                drop-shadow(0 2px 0 #070707) 
                drop-shadow(0 -2px 0 #070707)             
                drop-shadow(0 0 4px #ffd700)/* LAYER 2: Mulai Memancar (Sedang) */ /* Jarak 0 0 agar menyebar rata ke segala arah */
                
                /* LAYER 3: Pendaran Luas & Cerah (Paling Luar) */
                /* Gunakan radius blur besar (15px) agar pendarannya lembut */
                drop-shadow(0 0 8px rgba(255, 215, 0, 0.7)); /* Sedikit transparan agar cerah */
        /* 3. PENGATURAN POSISI & ANIMASI */
        opacity: 0;
        /* Mulai dari ukuran 0 (kecil sekali) */
        transform: scale(0); 
        /* Jalankan animasi zoom */
        animation: masuk-zoom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

       @keyframes masuk-zoom {
            0% {
                opacity: 0;
                transform: scale(0); /* Dari kecil */
            }
            100% {
                opacity: 1;
                transform: scale(1); /* Ke ukuran asli */
            }
        }      
        .hilang {
            animation: keluar-halus 1s ease-in forwards !important;/* Animasi untuk menghilangkan huruf sebelum diulang */
        }

        @keyframes keluar-halus {
            to { opacity: 0; transform: translateY(10px); }
        }      
        @keyframes typing { /* Keyframe untuk memunculkan huruf per karakter */
            from { width: 0; }
            to { width: 100%; }
        }      
        @keyframes ketik-kanan { /* Animasi Huruf Muncul dari Kanan */
            from { 
                width: 0; 
                margin-left: 100%; /* Mulai dari sisi kanan kapsul */
            }
            to { 
                width: 100%; 
                margin-left: 0; /* Berhenti di posisi normal */
            }
        }

        /* RUNNING TEXT BERGANTI HALUS */
        .marquee-container { 
            margin: 10px auto; 
            width: clamp(80%, 60%, 90%); 
            background: rgba(0, 0, 0, 0.7); 
            padding: 8px 20px; 
            border-radius: 50px; 
            border: 3px solid #D4AF37; 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); 
            text-align: center;
        }

        .marquee-text { 
            font-size: clamp(0.9rem, 2.5vw, 1.3rem); 
            color: #FFFFFF;
            font-weight: bold;
            transition: opacity 1s ease-in-out; 
            opacity: 1;
        }

        /* AREA TENGAH */
        .main-display { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            gap: 20px; 
            padding: 10px;
        }

        #jam-digital {
            font-family: 'Arial Black', Gadget, sans-serif;
            font-size: clamp(4rem, 18vw, 13rem); 
            font-weight: 900;
            line-height: 0.8;
            background: linear-gradient(to bottom, #fff 0%, #fff 0%, #fff 50%, #fff 0%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Outline Hijau Stabilo Rapi Luar Saja */
           filter: 
                /* LAYER 1: Pekat & Tajam (Paling Dekat Angka) */
                /* Kita buat 4 arah agar warnanya solid mengunci bentuk angka */
                drop-shadow(2px 0 0 #070707) 
                drop-shadow(-2px 0 0 #070707) 
                drop-shadow(0 2px 0 #070707) 
                drop-shadow(0 -2px 0 #070707)
                
                /* LAYER 2: Mulai Memancar (Sedang) */
                /* Jarak 0 0 agar menyebar rata ke segala arah */
                drop-shadow(0 0 8px #ffd700)
                
                /* LAYER 3: Pendaran Luas & Cerah (Paling Luar) */
                /* Gunakan radius blur besar (15px) agar pendarannya lembut */
                drop-shadow(0 0 15px rgba(255, 215, 0, 0.7)); /* Sedikit transparan agar cerah */

        }

        /* TANGGAL */
        .dates { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 15px; 
            width: 100%;
        }

        #tgl-masehi, #tgl-hijriah { 
            background: rgba(0, 0, 0, 0.7); 
            padding: 8px 25px; 
            border-radius: 50px; 
            border: 3px solid #D4AF37; 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            font-size: clamp(0.9rem, 3vw, 1.5rem); 
            font-weight: 800;
            text-align: center;
        }
        #tgl-masehi { color: #FFFFFF; }
        #tgl-hijriah { color: #CCFF00; }

        /* INFO BOX */
        .info-container { 
            display: flex; 
            gap: 20px; 
            width: 90%; 
            max-width: 1000px;
            justify-content: center; 
        }

        .card { 
            background: rgba(0, 0, 0, 0.85); 
            border: 2px solid #D4AF37; 
            border-radius: 12px; 
            flex: 1; 
            overflow: hidden;
        }

        .card-h { 
            background: #000; 
            color: #D4AF37; 
            padding: 8px; 
            font-weight: bold; 
            text-align: center; 
            font-size: clamp(0.8rem, 2vw, 1.1rem); 
            border-bottom: 2px solid #D4AF37;
        }

        .card-b { padding: 10px 15px; }

        .row { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px solid #444; 
            font-size: clamp(0.8rem, 2vw, 1.05rem); 
            padding: 5px 0; 
        }

        /* JADWAL SHOLAT */
        .prayer-section {
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 8px;
            padding: 15px; 
            background: rgba(0,0,0,0.6);
            border-top: 4px solid #ffd700;
        }
        .p-box { background: rgba(0,0,0,0.8); border: 2px solid #ffd700; border-radius: 10px; padding: 10px; text-align: center; }
        .p-name { color: #ffd700; font-size: 0.8rem; font-weight: bold; }
        .p-time { font-size: clamp(1.2rem, 4vw, 2.5rem); font-weight: 900; line-height: 1; }
        .next-sholat { background: linear-gradient(145deg, #ffd700, #b8860b) !important; box-shadow: 0 0 15px #ffd700; }
        .next-sholat .p-name, .next-sholat .p-time { color: #000 !important; }

        /* RESPONSIVE HP POTRET */
        @media (max-width: 600px) {
            .info-container { flex-direction: column; width: 100%; }
            .prayer-section { grid-template-columns: repeat(3, 1fr); }
            .dates { flex-direction: column; align-items: center; }
            #tgl-masehi, #tgl-hijriah { width: 90%; }
            .main-display { gap: 10px; }
        }

        /* ANIMASI */
        @keyframes animasi-pijar-gold {
            0%, 100% { filter: drop-shadow(3px 3px 2px #000) brightness(1); }
            50% { filter: drop-shadow(3px 3px 2px #000) brightness(1.2) drop-shadow(0 0 10px #ffd700); }
        }
        @keyframes muncul-halus { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* MODAL ADZAN */
        #mode-sholat { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 99999; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .big-text { background: linear-gradient(to bottom, #BF953F, #FCF6BA, #AA771C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 18vw; font-weight: 900; filter: drop-shadow(0 0 20px rgba(212,175,55,0.7)); }
        .sub-text { color: #D4AF37; font-size: 5vw; margin: 20px 0; font-weight: bold; }
        .blink-custom { animation: blink-logic 3s infinite; }
        @keyframes blink-logic { 0%, 66.6% { opacity: 1; } 66.7%, 100% { opacity: 0; } }
    </style>
</head>
<body>

<div id="ui-normal" style="min-height: 100vh; display: flex; flex-direction: column;">
    <div class="header-section">
     <div class="header-wrapper">
    <div id="header-animasi" class="header-text"></div>
</div>
        <div class="marquee-container">
            <div id="text-berita" class="marquee-text">Perum Jatisawit Asri, Jitengan, Balecatur, Gamping, Sleman</div>
        </div>
    </div>

    <div class="main-display">
        <div id="jam-digital">00:00:00</div>
        <div class="dates">
            <div id="tgl-masehi">--</div>
            <div id="tgl-hijriah">--</div>
        </div>
        <div class="info-container">
            <div class="card">
                <div class="card-h">KEUANGAN MASJID</div>
                <div class="card-b">
                    <div class="row"><span>Masuk</span><span id="kas-in">0</span></div>
                    <div class="row"><span>Keluar</span><span id="kas-out">0</span></div>
                    <div class="row" style="color:#ffd700; font-weight:bold;"><span>SALDO</span><span id="kas-saldo">0</span></div>
                </div>
            </div>
            <div class="card">
                <div class="card-h">IMAM & PENCERAMAH</div>
                <div class="card-b">
                    <div class="row"><span>Tarawih</span><span id="im-t">-</span></div>
                    <div class="row"><span>Subuh</span><span id="im-s">-</span></div>
                    <div class="row"><span>Jum'at</span><span id="im-j">-</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="prayer-section">
        <div class="p-box" id="box-SUBUH"><div class="p-name">SUBUH</div><div class="p-time" id="sh-subuh">--:--</div></div>
        <div class="p-box" id="box-SYURUQ"><div class="p-name">SYURUQ</div><div class="p-time" id="sh-terbit">--:--</div></div>
        <div class="p-box" id="box-ZUHUR"><div class="p-name">ZUHUR</div><div class="p-time" id="sh-zuhur">--:--</div></div>
        <div class="p-box" id="box-ASHAR"><div class="p-name">ASHAR</div><div class="p-time" id="sh-ashar">--:--</div></div>
        <div class="p-box" id="box-MAGHRIB"><div class="p-name">MAGHRIB</div><div class="p-time" id="sh-maghrib">--:--</div></div>
        <div class="p-box" id="box-ISYA"><div class="p-name">ISYA</div><div class="p-time" id="sh-isya">--:--</div></div>
    </div>
</div>

<div id="mode-sholat">
    <div id="msg-atas" class="sub-text"></div>
    <div id="msg-utama" class="big-text"></div>
    <div id="msg-bawah" class="sub-text"></div>
</div>

<script>
    const DURASI_ADZAN = 10; const DURASI_IQOMAH = 10; const DURASI_SHOLAT = 10; 
    const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2pXtcn5uyLwqeOsurcrr7F5HyQWD0sRpeX2kkOPwLbfcKhzj2C74XGeIzEFz8fyTRAl03nq-QY3ip/pub?gid=224039655&single=true&output=csv';
    let jadwal = {}; let timer; let modeAktif = false;


//untuk menjalankan animasi header masjid darussalam
function jalankanAnimasiHuruf() {
        const wadah = document.getElementById('header-animasi');
        const kata = "MASJID DARUSSALAM";
        const durasiDiam = 3000; // Diam selama 3 detik (2000 milidetik)
        wadah.innerHTML = "";   // 1. Bersihkan wadah  
        kata.split("").forEach((huruf, urutan) => {// 2. Pecah kata jadi huruf dan masukkan ke layar
            const span = document.createElement("span");
            span.innerHTML = huruf === " " ? "&nbsp;" : huruf;
            span.style.animationDelay = `${urutan * 0.1}s`; // Muncul satu-satu dari kanan
            wadah.appendChild(span);
        });
        // 3. Hitung total waktu animasi muncul 
        const totalWaktuTampil = (kata.length * 100) + 600 + durasiDiam;// (Jumlah huruf * 0.1s) + durasi gerak 0.6s + waktu diam 2s
        setTimeout(() => {
            // Beri kelas 'hilang' ke semua huruf sebelum diulang
            const semuaHuruf = wadah.querySelectorAll('span');
            semuaHuruf.forEach(s => s.classList.add('hilang'));
            // Tunggu sebentar pas menghilang, lalu jalankan lagi dari awal (Loop)
            setTimeout(jalankanAnimasiHuruf, 600);            
        }, totalWaktuTampil);
    }    
    jalankanAnimasiHuruf();// Jalankan pertama kali saat halaman dibuka


    async function muatData() {
        try {
            const res = await fetch(urlCSV + '&t=' + Date.now());
            const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
            const b2 = rows[2];
            document.getElementById('tgl-hijriah').innerText = rows[1][2] + " " + b2[0];
            jadwal = { "SUBUH": b2[1].padStart(5, '0'), "SYURUQ": b2[2].padStart(5, '0'), "ZUHUR": b2[3].padStart(5, '0'), "ASHAR": b2[4].padStart(5, '0'), "MAGHRIB": b2[5].padStart(5, '0'), "ISYA": b2[6].padStart(5, '0') };
            document.getElementById('sh-subuh').innerText = jadwal.SUBUH;
            document.getElementById('sh-terbit').innerText = jadwal.SYURUQ;
            document.getElementById('sh-zuhur').innerText = jadwal.ZUHUR;
            document.getElementById('sh-ashar').innerText = jadwal.ASHAR;
            document.getElementById('sh-maghrib').innerText = jadwal.MAGHRIB;
            document.getElementById('sh-isya').innerText = jadwal.ISYA;
            document.getElementById('kas-in').innerText = b2[8];
            document.getElementById('kas-out').innerText = b2[9];
            document.getElementById('kas-saldo').innerText = b2[10];
            document.getElementById('im-t').innerText = b2[11];
            document.getElementById('im-s').innerText = b2[12];
            document.getElementById('im-j').innerText = b2[13];
        } catch (e) { console.error("CSV Error"); }
    }

    function sistemWaktu() {
        const now = new Date();
        const jamMenit = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        document.getElementById('jam-digital').innerText = now.toLocaleTimeString('id-ID');
        document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        let foundNext = false;
        const urutan = ["SUBUH", "SYURUQ", "ZUHUR", "ASHAR", "MAGHRIB", "ISYA"];
        urutan.forEach(s => {
            let box = document.getElementById('box-' + s);
            box.classList.remove('next-sholat');
            if (!foundNext && jamMenit < jadwal[s]) {
                box.classList.add('next-sholat');
                foundNext = true;
            }
        });
        if (!foundNext) document.getElementById('box-SUBUH').classList.add('next-sholat');

        for (let s in jadwal) {
            if (s !== "SYURUQ" && jamMenit === jadwal[s] && !modeAktif) {
                mulaiModeSholat("ADZAN", s, DURASI_ADZAN);
            }
        }
    }

    function mulaiModeSholat(tipe, nama, detik) {
        modeAktif = true;
        document.getElementById('mode-sholat').style.display = 'flex';
        let sisa = detik;
        clearInterval(timer);
        timer = setInterval(() => {
            const m_atas = document.getElementById('msg-atas');
            const m_utama = document.getElementById('msg-utama');
            const m_bawah = document.getElementById('msg-bawah');
            m_atas.classList.remove('blink-custom');
            m_utama.classList.remove('blink-custom');

            if (tipe === "ADZAN") {
                m_atas.innerText = "SAAT ADZAN";
                m_utama.innerText = nama;
                m_utama.classList.add('blink-custom');
                m_bawah.innerText = "Harap Tenang & Mendengarkan";
            } else if (tipe === "IQOMAH") {
                m_atas.innerText = "MENUJU IQOMAH";
                m_atas.classList.add('blink-custom');
                let min = Math.floor(sisa / 60); let sec = sisa % 60;
                m_utama.innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
                m_bawah.innerText = "MATIKAN HP & DIRIKAN SHOLAT SUNNAH";
            } else if (tipe === "SHOLAT") {
                m_atas.innerText = "DIRIKAN";
                m_utama.innerText = "SHOLAT";
                m_utama.classList.add('blink-custom');
                m_bawah.innerText = "NIAT & SHOLAT DENGAN KHUSYU'";
            }

            sisa--;
            if (sisa < 0) {
                if (tipe === "ADZAN") mulaiModeSholat("IQOMAH", nama, DURASI_IQOMAH);
                else if (tipe === "IQOMAH") mulaiModeSholat("SHOLAT", nama, DURASI_SHOLAT);
                else { document.getElementById('mode-sholat').style.display = 'none'; modeAktif = false; clearInterval(timer); }
            }
        }, 1000);
    }

    const daftarTeks = ["Perum Jatisawit Asri, Jitengan, Balecatur, Gamping, Sleman", "Tanggal & Jadwal SHOLAT Mengacu KHGT Muhammadiyah"];
    let indeksTeks = 0;
    function gantiTeksBerita() {
        const el = document.getElementById('text-berita');
        if (el) {
            el.style.opacity = 0;
            setTimeout(() => {
                indeksTeks = (indeksTeks + 1) % daftarTeks.length;
                el.innerText = daftarTeks[indeksTeks];
                el.style.opacity = 1;
            }, 1000); 
        }
    }
    setInterval(gantiTeksBerita, 7000);
    setInterval(sistemWaktu, 1000);
    muatData(); setInterval(muatData, 600000);
</script>
</body>
</html>
